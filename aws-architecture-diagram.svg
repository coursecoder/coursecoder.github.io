<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="'JetBrains Mono', monospace">
  <!-- Background -->
  <rect width="900" height="540" fill="#f9f7f5"/>

  <!-- Grid lines subtle -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e8e3de" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c17b8e"/>
    </marker>
    <marker id="arrowhead-slate" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="url(#grid)"/>

  <!-- Corner brackets (portfolio style) -->
  <path d="M 20 20 L 50 20 L 50 26 L 26 26 L 26 50 L 20 50 Z" fill="#c17b8e"/>
  <path d="M 880 20 L 850 20 L 850 26 L 874 26 L 874 50 L 880 50 Z" fill="#c17b8e"/>
  <path d="M 20 520 L 50 520 L 50 514 L 26 514 L 26 490 L 20 490 Z" fill="#c17b8e"/>
  <path d="M 880 520 L 850 520 L 850 514 L 874 514 L 874 490 L 880 490 Z" fill="#c17b8e"/>

  <!-- Label -->
  <text x="30" y="18" font-size="9" fill="#c17b8e" letter-spacing="2" font-family="'JetBrains Mono', monospace">FIG 2.1: AWS SERVERLESS ARCHITECTURE</text>

  <!-- ===== AWS BOUNDARY BOX ===== -->
  <rect x="180" y="60" width="580" height="420" rx="4" fill="none" stroke="#c17b8e" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- AWS label -->
  <rect x="180" y="52" width="70" height="18" fill="#f9f7f5"/>
  <text x="215" y="65" font-size="10" fill="#c17b8e" text-anchor="middle" letter-spacing="1" font-family="'JetBrains Mono', monospace">▲ AWS</text>

  <!-- ===== GAME WEBSITE (left) ===== -->
  <rect x="30" y="195" width="110" height="100" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="30" y="195" width="110" height="22" rx="4" fill="#f1f5f9"/>
  <rect x="30" y="209" width="110" height="8" fill="#f1f5f9"/>
  <!-- browser chrome dots -->
  <circle cx="44" cy="206" r="3" fill="#c17b8e" opacity="0.6"/>
  <circle cx="54" cy="206" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="64" cy="206" r="3" fill="#64748b" opacity="0.3"/>
  <!-- browser lines -->
  <line x1="42" y1="225" x2="128" y2="225" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="42" y1="232" x2="110" y2="232" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="42" y1="239" x2="120" y2="239" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="42" y1="246" x2="100" y2="246" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="42" y1="253" x2="115" y2="253" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="42" y1="260" x2="105" y2="260" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- website label -->
  <text x="85" y="283" font-size="8" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', monospace">GAME WEBSITE</text>

  <!-- Step labels left side -->
  <circle cx="50" cy="170" r="12" fill="#1e293b"/>
  <text x="50" y="174" font-size="9" fill="white" text-anchor="middle" font-weight="bold">1</text>
  <text x="68" y="166" font-size="8" fill="#475569" font-family="'JetBrains Mono', monospace">loads home page</text>

  <circle cx="50" cy="140" r="12" fill="#1e293b"/>
  <text x="50" y="144" font-size="9" fill="white" text-anchor="middle" font-weight="bold">2</text>
  <text x="68" y="136" font-size="8" fill="#475569" font-family="'JetBrains Mono', monospace">user selects button</text>

  <!-- ===== S3 BUCKET ===== -->
  <rect x="210" y="400" width="110" height="65" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- S3 icon stylized -->
  <ellipse cx="265" cy="415" rx="22" ry="7" fill="none" stroke="#c17b8e" stroke-width="1.5"/>
  <rect x="243" y="415" width="44" height="25" fill="none" stroke="#c17b8e" stroke-width="1.5"/>
  <ellipse cx="265" cy="440" rx="22" ry="7" fill="none" stroke="#c17b8e" stroke-width="1.5"/>
  <text x="265" y="455" font-size="8" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', monospace">S3 BUCKET</text>
  <text x="265" y="464" font-size="7" fill="#94a3b8" text-anchor="middle" font-family="'JetBrains Mono', monospace">hosts HTML/JS</text>

  <!-- ===== API GATEWAY ===== -->
  <rect x="340" y="130" width="130" height="260" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="340" y="130" width="130" height="30" rx="4" fill="#fdf2f5"/>
  <rect x="340" y="152" width="130" height="8" fill="#fdf2f5"/>
  <!-- API icon -->
  <rect x="370" y="138" rx="2" width="70" height="16" fill="none" stroke="#c17b8e" stroke-width="1.5"/>
  <line x1="375" y1="146" x2="380" y2="146" stroke="#c17b8e" stroke-width="1.5"/>
  <line x1="383" y1="146" x2="388" y2="146" stroke="#c17b8e" stroke-width="1.5"/>
  <line x1="391" y1="146" x2="396" y2="146" stroke="#c17b8e" stroke-width="1.5"/>
  <text x="405" y="174" font-size="9" fill="#1e293b" text-anchor="middle" font-weight="bold" letter-spacing="0.5">API GATEWAY</text>

  <!-- GET /leaderboard -->
  <rect x="355" y="185" width="100" height="50" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="405" y="200" font-size="8" fill="#c17b8e" text-anchor="middle" font-family="'JetBrains Mono', monospace">GET</text>
  <text x="405" y="212" font-size="7.5" fill="#475569" text-anchor="middle" font-family="'JetBrains Mono', monospace">/leaderboard</text>
  <text x="405" y="225" font-size="7" fill="#94a3b8" text-anchor="middle" font-family="'JetBrains Mono', monospace">resource</text>

  <!-- GET /leaderboard/top_gamer -->
  <rect x="355" y="248" width="100" height="50" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="405" y="263" font-size="8" fill="#c17b8e" text-anchor="middle" font-family="'JetBrains Mono', monospace">GET</text>
  <text x="405" y="275" font-size="7" fill="#475569" text-anchor="middle" font-family="'JetBrains Mono', monospace">/leaderboard</text>
  <text x="405" y="285" font-size="7" fill="#475569" text-anchor="middle" font-family="'JetBrains Mono', monospace">/top_gamer</text>

  <!-- POST /score/submit -->
  <rect x="355" y="312" width="100" height="50" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="405" y="327" font-size="8" fill="#1e293b" text-anchor="middle" font-family="'JetBrains Mono', monospace">POST</text>
  <text x="405" y="339" font-size="7.5" fill="#475569" text-anchor="middle" font-family="'JetBrains Mono', monospace">/score/submit</text>
  <text x="405" y="351" font-size="7" fill="#94a3b8" text-anchor="middle" font-family="'JetBrains Mono', monospace">resource</text>

  <!-- ===== LAMBDA ===== -->
  <rect x="530" y="130" width="130" height="220" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="530" y="130" width="130" height="30" rx="4" fill="#fdf2f5"/>
  <rect x="530" y="152" width="130" height="8" fill="#fdf2f5"/>
  <!-- Lambda icon (λ) -->
  <text x="595" y="149" font-size="13" fill="#c17b8e" text-anchor="middle" font-weight="bold">λ</text>
  <text x="595" y="172" font-size="9" fill="#1e293b" text-anchor="middle" font-weight="bold" letter-spacing="0.5">AWS LAMBDA</text>

  <!-- get_all_leaderboard function -->
  <rect x="545" y="185" width="100" height="60" rx="3" fill="#fdf2f5" stroke="#c17b8e" stroke-width="1" opacity="0.8"/>
  <text x="595" y="202" font-size="7.5" fill="#c17b8e" text-anchor="middle" font-style="italic" font-family="'JetBrains Mono', monospace">get_all_</text>
  <text x="595" y="213" font-size="7.5" fill="#c17b8e" text-anchor="middle" font-style="italic" font-family="'JetBrains Mono', monospace">leaderboard</text>
  <text x="595" y="227" font-size="7" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', monospace">function</text>

  <!-- submit_score function -->
  <rect x="545" y="265" width="100" height="60" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="595" y="285" font-size="7.5" fill="#c17b8e" text-anchor="middle" font-style="italic" font-family="'JetBrains Mono', monospace">submit_score</text>
  <text x="595" y="300" font-size="7" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', monospace">function</text>

  <!-- ===== DYNAMODB ===== -->
  <rect x="730" y="155" width="120" height="140" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="730" y="155" width="120" height="30" rx="4" fill="#fdf2f5"/>
  <rect x="730" y="177" width="120" height="8" fill="#fdf2f5"/>
  <!-- DynamoDB icon -->
  <ellipse cx="790" cy="165" rx="18" ry="6" fill="none" stroke="#c17b8e" stroke-width="1.5"/>
  <text x="790" y="200" font-size="9" fill="#1e293b" text-anchor="middle" font-weight="bold" letter-spacing="0.5">DYNAMODB</text>

  <!-- LeaderBoard table -->
  <rect x="748" y="215" width="84" height="65" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="748" y="215" width="84" height="16" rx="3" fill="#f1f5f9"/>
  <!-- table rows -->
  <line x1="748" y1="231" x2="832" y2="231" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="748" y1="243" x2="832" y2="243" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="748" y1="255" x2="832" y2="255" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="748" y1="267" x2="832" y2="267" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="790" y1="215" x2="790" y2="280" stroke="#e2e8f0" stroke-width="1"/>
  <text x="790" y="226" font-size="7" fill="#c17b8e" text-anchor="middle" font-weight="bold" font-family="'JetBrains Mono', monospace">LeaderBoard</text>
  <text x="790" y="295" font-size="7.5" fill="#64748b" text-anchor="middle" font-family="'JetBrains Mono', monospace">stores game data</text>

  <!-- ===== STEP NUMBERS ===== -->
  <!-- Step 3 - website to API Gateway -->
  <circle cx="310" cy="210" r="10" fill="#1e293b"/>
  <text x="310" y="214" font-size="8" fill="white" text-anchor="middle" font-weight="bold">3</text>

  <circle cx="310" cy="273" r="10" fill="#1e293b"/>
  <text x="310" y="277" font-size="8" fill="white" text-anchor="middle" font-weight="bold">3</text>

  <!-- Step 4 -->
  <circle cx="660" cy="210" r="10" fill="#1e293b"/>
  <text x="660" y="214" font-size="8" fill="white" text-anchor="middle" font-weight="bold">4</text>
  <text x="680" y="206" font-size="8" fill="#475569" font-family="'JetBrains Mono', monospace">Lambda queries</text>
  <text x="680" y="218" font-size="8" fill="#475569" font-family="'JetBrains Mono', monospace">database table</text>

  <!-- Step 5 -->
  <circle cx="660" cy="260" r="10" fill="#1e293b"/>
  <text x="660" y="264" font-size="8" fill="white" text-anchor="middle" font-weight="bold">5</text>
  <text x="680" y="262" font-size="8" fill="#475569" font-family="'JetBrains Mono', monospace">data returned</text>

  <!-- ===== ARROWS ===== -->
  <!-- Website → API Gateway (top) -->
  <line x1="140" y1="222" x2="338" y2="210" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Website → API Gateway (mid) -->
  <line x1="140" y1="245" x2="338" y2="273" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Website → API Gateway (post) -->
  <line x1="140" y1="262" x2="338" y2="337" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead-slate)"/>

  <!-- API Gateway → Lambda (GET leaderboard) -->
  <line x1="456" y1="210" x2="528" y2="210" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- API Gateway → Lambda (GET top_gamer) -->
  <line x1="456" y1="273" x2="528" y2="230" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- API Gateway → Lambda (POST) -->
  <line x1="456" y1="337" x2="528" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead-slate)"/>

  <!-- Lambda → DynamoDB -->
  <line x1="661" y1="215" x2="728" y2="230" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- DynamoDB → Lambda (return) -->
  <line x1="728" y1="250" x2="661" y2="250" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead-slate)"/>

  <!-- Lambda → Website (return) -->
  <path d="M 528 240 Q 440 420 140 255" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-slate)"/>

  <!-- S3 → Website -->
  <line x1="210" y1="432" x2="140" y2="280" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead-slate)"/>

  <!-- Website → S3 (load) -->
  <path d="M 85 295 Q 85 360 210 420" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-slate)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="410" width="130" height="95" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="95" y="427" font-size="8" fill="#1e293b" text-anchor="middle" font-weight="bold" letter-spacing="1" font-family="'JetBrains Mono', monospace">LEGEND</text>
  <line x1="45" y1="443" x2="75" y2="443" stroke="#c17b8e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="85" y="447" font-size="7.5" fill="#475569" font-family="'JetBrains Mono', monospace">request</text>
  <line x1="45" y1="460" x2="75" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead-slate)"/>
  <text x="85" y="464" font-size="7.5" fill="#475569" font-family="'JetBrains Mono', monospace">response</text>
  <rect x="45" y="472" width="14" height="10" rx="2" fill="none" stroke="#c17b8e" stroke-width="1" opacity="0.7"/>
  <text x="66" y="481" font-size="7.5" fill="#475569" font-family="'JetBrains Mono', monospace">AWS service</text>
  <rect x="45" y="487" width="14" height="10" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <text x="66" y="496" font-size="7.5" fill="#475569" font-family="'JetBrains Mono', monospace">resource/fn</text>

  <!-- Bottom signature -->
  <text x="870" y="532" font-size="8" fill="#c17b8e" text-anchor="end" letter-spacing="1" font-family="'JetBrains Mono', monospace" opacity="0.7">COLEEN STANLEY // coursecoder.com</text>
</svg>
